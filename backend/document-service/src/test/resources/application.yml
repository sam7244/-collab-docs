spring:
  datasource:
    url: jdbc:h2:mem:doc_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@test.com
    password: testpass

eureka:
  client:
    enabled: false

app:
  frontend-url: http://localhost:3000
  inactivity-threshold-minutes: 5
  inactivity-email-cooldown-minutes: 10
  inactivity-check-cron: "0 */5 * * * *"
  email-notifications-enabled: false
