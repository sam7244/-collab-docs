server:
  port: 8082

spring:
  application:
    name: document-service
  datasource:
    url: jdbc:mysql://localhost:3306/documents_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: collab
    password: collabpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: document-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  health:
    mail:
      enabled: false

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  # Minutes of no edits before a doc is flagged as inactive
  inactivity-threshold-minutes: ${INACTIVITY_THRESHOLD_MINUTES:5}
  # Minimum gap (minutes) before re-sending email for the same doc
  inactivity-email-cooldown-minutes: ${INACTIVITY_EMAIL_COOLDOWN_MINUTES:10}
  # Cron expression — format: second minute hour day-of-month month day-of-week
  inactivity-check-cron: ${INACTIVITY_CHECK_CRON:0 */5 * * * *}
  # Set to false to disable inactivity email notifications
  email-notifications-enabled: ${EMAIL_NOTIFICATIONS_ENABLED:true}
